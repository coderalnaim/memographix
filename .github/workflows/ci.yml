name: CI

on:
  push:
  pull_request:

jobs:
  python:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Hygiene check
        run: python scripts/check_hygiene.py
      - name: Install test dependencies
        run: python -m pip install pytest build
      - name: Dependency check
        run: python -m pip check
      - name: Run tests through Python fallback
        run: python -m pytest -q
        env:
          PYTHONPATH: python

  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --manifest-path crates/memographix-core/Cargo.toml --check
      - name: Clippy
        run: cargo clippy --manifest-path crates/memographix-core/Cargo.toml --all-targets -- -D warnings
      - name: Test
        run: cargo test --manifest-path crates/memographix-core/Cargo.toml --all-targets
